<!DOCTYPE html>

<html>
  <head>
    <style>
      .box{
        width: 300px;
        border: 1px solid black;
        display: inline-block;
        box-shadow: 0px 5px 8px black;
      }
      .ll{
        display: inline-block;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        margin-left: 10px;
        vertical-align: middle;
      }
      span{
        margin-left: 10px;
      }
      button{
        background-color: rgb(128, 171, 224);
        color: white;
        border: none;
        height: 30px;
        width: 85px;
        margin-left: 10px;
      }
      .mm{
        font-family: Arial;
        font-size: 17px;
        color: gray;
       }
      .ll{
        font-family: Arial;
        font-size: 26px;

       }
       .nn{
        width: 300px;
       }

    </style>
  </head>
  <body>
    <div class="box"> 
        <div class="profile"> 
          <img class="nn" src="cat photo.webp" alt="photo">
        </div> 
        <br>
        <span class="ll">Oliver</span>
        <br>
        <div>
          <img  class="ll" src="cat.jpg" width="150px">
          <span class="mm">2 mutual friends</span>
          <br> <br>
          <button type="submit">Add Friend</button>
        </div>
    </div>
  </body>
</html>
