<!DOCTYPE html>
<html>
    <head>
        <style>
            .box{
                display: flex;
                flex-direction: column;
                height: 150px;
                border: 3px solid black;
                justify-content: space-between;
                align-items: center;
                padding: 10px;

            }
            .element1{
                background-color: lightblue;
                color: white;
                height: 30px;
                width: 80px;
                border-radius: 4px;
                padding-left: 10px;
                padding-top: 5px;
            }
            
            .element2{
                background-color: lightpink;
                color: white;
                height: 30px;
                width: 80px;
                border-radius: 4px;
                padding-left: 10px;
                padding-top: 5px;
            }

            .element3{
                background-color: lightgreen;
                color: white;
                height: 30px;
                border-radius: 4px;
                width: 80px;
                padding-left: 10px;
                padding-top: 5px;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <div class="element1">Element 1</div>
            <div class="element2">Element 2</div>
            <div class="element3">Element 3</div>
        </div>
    </body>
</html>
