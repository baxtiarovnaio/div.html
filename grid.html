<!DOCTYPE html>

<html>
    <head></head>
    <body>
        <div style="
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;">
            <div style="background-color: lightblue;">1fr</div>
            <div style="background-color: lightcoral;">1fr</div>
        </div>
        <div style="
            margin-top: 30px;
            display: grid; 
            grid-template-columns: 250px 1fr;">
            <div style="background-color: brown;">250px</div>
            <div style="background-color: aqua;">1fr</div>
        </div>
        <div style="
             margin-top: 30px;
             display: grid;
             grid-template-columns: repeat(3, 200px);">
            <div style="background-color: aquamarine;">200px</div>
            <div style="background-color: aqua;">200px</div>
            <div style="background-color: antiquewhite;">200px</div>
        </div>
        <div style="
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;">
            <div style="background-color: rgb(150, 150, 230);">Box1</div>
            <div style="background-color: rgb(245, 131, 131);">Box2</div>
            <div style="background-color: rgb(180, 136, 221);">Box3</div>
        </div>
            <div style="
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr)">
            <div style="background-color: rgb(225, 230, 150);">Box1</div>
            <div style="background-color: rgb(131, 245, 165);">Box2</div>
            <div style="background-color: rgb(221, 136, 200);">Box3</div>
        </div>
        <div style="
             margin-top: 30px;
             display:grid;
             grid-template-columns: 100px 1fr 2fr 50px;">
            <div style="background-color: beige;">100px</div>
            <div style="background-color: aqua;">1fr</div>
            <div style="background-color: antiquewhite;">2fr</div>
            <div style="background-color: aquamarine;">50px</div>
            
        </div>
    </body>
</html>
